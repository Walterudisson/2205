<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Do you love me?</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #ffd6e7, #ffeef5);
        overflow:hidden;
    }

    .card{
        width:350px;
        background:white;
        border-radius:25px;
        padding:30px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        position:relative;
    }

    .container{
        position:relative;
        width:220px;
        height:220px;
        margin:0 auto 20px;
    }

    .background-img{
        width:100%;
        height:100%;
        object-fit:contain;
    }

    .gif{
        position:absolute;
        width:80px;
        height:80px;
        object-fit:cover;
        border-radius:15px;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
    }

    h1{
        font-size:28px;
        color:#ff4f81;
        margin-bottom:25px;
    }

    .buttons{
        position:relative;
        height:80px;
    }

    button{
        border:none;
        padding:14px 28px;
        border-radius:15px;
        font-size:18px;
        cursor:pointer;
        transition:0.2s ease;
        position:absolute;
    }

    #yesBtn{
        left:60px;
        background:#ff4f81;
        color:white;
    }

    #yesBtn:hover{
        transform:scale(1.08);
    }

    #noBtn{
        right:60px;
        background:#ececec;
        color:#333;
    }

    .success{
        animation:pop 0.5s ease;
    }

    @keyframes pop{
        0%{
            transform:scale(0.8);
            opacity:0;
        }

        100%{
            transform:scale(1);
            opacity:1;
        }
    }
</style>
</head>

<body>

<div class="card">

    <!-- CONTAINER COM IMAGEM DE FUNDO E GIF SOBREPOSTO -->
    <div class="container">
        <svg class="background-img" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <!-- Background do illustration -->
            <defs>
                <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                    <circle cx="5" cy="5" r="2" fill="black" opacity="0.3"/>
                </pattern>
            </defs>
            <rect width="500" height="500" fill="url(#dots)"/>
            
            <!-- Corações -->
            <text x="100" y="80" font-size="30">❤️</text>
            <text x="380" y="120">❤️</text>
            <text x="80" y="400">❤️</text>
            <text x="420" y="350">❤️</text>
            
            <!-- Texto "1 ANO QUE A GENTE SE AGUENTA AMA" -->
            <text x="250" y="100" font-size="48" font-weight="bold" text-anchor="middle" font-family="Arial">1 ANO</text>
            <text x="250" y="160" font-size="48" font-weight="bold" text-anchor="middle" font-family="Arial">A GENTE SE</text>
            <text x="250" y="220" font-size="48" font-weight="bold" text-anchor="middle" font-family="Arial">AGUENTA AMA</text>
            
            <!-- Casal feliz (stick figures simplificado) -->
            <circle cx="150" cy="330" r="25" stroke="black" stroke-width="3" fill="none"/>
            <line x1="150" y1="355" x2="130" y2="400" stroke="black" stroke-width="3"/>
            <line x1="150" y1="355" x2="170" y2="400" stroke="black" stroke-width="3"/>
            
            <circle cx="320" cy="320" r="25" stroke="black" stroke-width="3" fill="none"/>
            <line x1="320" y1="345" x2="300" y2="390" stroke="black" stroke-width="3"/>
            <line x1="320" y1="345" x2="340" y2="390" stroke="black" stroke-width="3"/>
        </svg>
        
        <!-- GIF SOBREPOSTO -->
        <img 
            id="bearGif"
            class="gif"
            src="https://media.tenor.com/8QfSNUhS5wAAAAAC/bear-love.gif"
            alt="Ursinhos"
        >
    </div>

    <h1 id="question">
        Você me ama? ❤️
    </h1>

    <div class="buttons">

        <button id="yesBtn">
            Sim 💖
        </button>

        <button id="noBtn">
            Não 😅
        </button>

    </div>

</div>

<script>

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");

    const gif = document.getElementById("bearGif");
    const question = document.getElementById("question");

    // BOTÃO NÃO FOGE
    noBtn.addEventListener("mouseover", () => {

        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        noBtn.style.position = "fixed";
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;
    });

    // CLICOU EM SIM
    yesBtn.addEventListener("click", () => {

        gif.src = "https://media.tenor.com/CzdMW7wnLn8AAAAi/cute-bears-love.gif";

        question.innerHTML = "Eu sabiaaaa 🥹❤️";

        document.querySelector(".buttons").style.display = "none";

        gif.classList.add("success");
    });

</script>

</body>
</html>
