<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Do you love me?</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #ffd6e7, #ffeef5);
        overflow:hidden;
    }

    .card{
        width:100%;
        max-width:500px;
        background:white;
        border-radius:25px;
        padding:30px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        position:relative;
    }

    .container{
        position:relative;
        width:240px;
        height:240px;
        margin:0 auto 10px;
    }

    .image{
        width:70%;
        height:70%;
        object-fit:cover;
        border-radius:20px;
    }

    h1{
        font-size:28px;
        color:#ff4f81;
        margin-bottom:25px;
    }

    .buttons{
        position:relative;
        height:80px;
    }

    button{
        border:none;
        padding:14px 28px;
        border-radius:15px;
        font-size:18px;
        cursor:pointer;
        transition:0.2s ease;
        position:absolute;
    }

    #yesBtn{
        left:60px;
        background:#ff4f81;
        color:white;
    }

    #yesBtn:hover{
        transform:scale(1.08);
    }

    #noBtn{
        right:60px;
        background:#ececec;
        color:#333;
    }

    .success{
        animation:pop 0.5s ease;
    }

    @keyframes pop{
        0%{
            transform:scale(0.8);
            opacity:0;
        }

        100%{
            transform:scale(1);
            opacity:1;
        }
    }
</style>
</head>

<body>

<div class="card">

    <!-- ENLARGED IMAGE -->
    <div class="container">
        <img 
            id="bearGif"
            class="image"
            src="ChatGPT Image 20 de mai. de 2026, 14_54_22.png"
            alt="Teddy Bears"
        >
    </div>

    <h1 id="question">
        Você me ama? ❤️
    </h1>

    <div class="buttons">

        <button id="yesBtn">
            Sim 💖
        </button>

        <button id="noBtn">
            Não 😅
        </button>

    </div>

</div>

<script>

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");

    const gif = document.getElementById("bearGif");
    const question = document.getElementById("question");

    // BOTÃO NÃO FOGE
    noBtn.addEventListener("mouseover", () => {

        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        noBtn.style.position = "fixed";
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;
    });

    // CLICOU EM SIM
    yesBtn.addEventListener("click", () => {

        gif.src = "ChatGPT Image 20 de mai. de 2026, 14_54_22.png";

        question.innerHTML = "Eu sabiaaaa 🥹❤️";

        document.querySelector(".buttons").style.display = "none";

        gif.classList.add("success");
    });

</script>

</body>
</html>
